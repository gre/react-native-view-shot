  test-detox-ios:
    name: Detox E2E Tests (iOS)
    runs-on: macos-15
    needs: build-ios

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: example/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install applesimutils for iOS Detox
        run: |
          # Install applesimutils from GitHub (brew formula doesn't exist)
          curl -L https://github.com/wix/AppleSimulatorUtils/releases/download/0.9.6/AppleSimulatorUtils-0.9.6.tar.gz | tar -xz
          # The archive contains a directory, navigate to it
          cd AppleSimulatorUtils-0.9.6
          # Use the default Xcode path (don't override it)
          xcodebuild -project AppleSimulatorUtils.xcodeproj -scheme AppleSimulatorUtils -configuration Release -derivedDataPath ./build clean build
          sudo cp ./build/Build/Products/Release/applesimutils /usr/local/bin/

      - name: Build library
        run: npm run build

      - name: Install example dependencies
        working-directory: example
        run: npm ci --legacy-peer-deps

      - name: Setup CocoaPods
        uses: maxim-lobanov/setup-cocoapods@v1
        with:
          version: latest

      - name: Pod install
        working-directory: example/ios
        run: pod install --verbose

      - name: Build iOS for Detox
        working-directory: example
        run: npm run build:e2e:ios

      - name: Start Metro Bundler
        working-directory: example
        run: |
          npm start &
          echo $! > metro.pid
          sleep 30

      - name: Run Detox Tests
        working-directory: example
        run: npm run test:e2e:ios
        continue-on-error: true
        id: detox_ios_tests

      - name: Check for iOS snapshot differences
        if: failure() && steps.detox_ios_tests.outcome == 'failure'
        working-directory: example
        run: |
          if [ -d "e2e/snapshots/output" ] && [ "$(ls -A e2e/snapshots/output 2>/dev/null)" ]; then
            echo "## 📱 iOS Visual Regression Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Some iOS visual snapshots have changed. This could be due to:" >> $GITHUB_STEP_SUMMARY
            echo "- UI changes in the React Native example" >> $GITHUB_STEP_SUMMARY
            echo "- Different rendering between iOS versions" >> $GITHUB_STEP_SUMMARY
            echo "- Font or styling differences" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**To update snapshots:**" >> $GITHUB_STEP_SUMMARY
            echo "1. Download the \`detox-snapshots-ios\` artifact" >> $GITHUB_STEP_SUMMARY
            echo "2. Replace \`example/e2e/snapshots/reference/\` with the downloaded files" >> $GITHUB_STEP_SUMMARY
            echo "3. Commit the updated snapshots" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Diff files available in artifacts:**" >> $GITHUB_STEP_SUMMARY
            find e2e/snapshots/output -name "*.png" | head -5 | while read file; do
              echo "- \`$(basename "$file")\`" >> $GITHUB_STEP_SUMMARY
            done
          fi

      - name: Stop Metro Bundler
        if: always()
        working-directory: example
        run: |
          if [ -f metro.pid ]; then
            kill $(cat metro.pid) || true
            rm metro.pid
          fi

      - name: Upload Detox Snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detox-snapshots-ios
          path: |
            example/e2e/snapshots/output/**/*.png
            example/e2e/snapshots/reference/**/*.png
            example/artifacts/**/*.png

      - name: Upload Detox Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detox-test-results-ios
          path: |
            example/e2e/test-results/**/*
            example/artifacts/**/*.xml

      - name: Fail CI if iOS tests failed
        if: steps.detox_ios_tests.outcome == 'failure'
        run: |
          echo "❌ iOS Detox tests failed - failing CI"
          exit 1

  test-detox-android:
    name: Detox E2E Tests (Android)
    runs-on: ubuntu-latest
    needs: build-android

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-28-pixel3a

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build library
        run: npm run build

      - name: Install example dependencies
        working-directory: example
        run: npm ci --legacy-peer-deps

      - name: Build Android APKs for Detox
        working-directory: example
        run: npm run build:e2e:android

      - name: Clean up disk space before AVD creation
        run: |
          echo "🧹 Cleaning up disk space..."
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android/sdk/emulator/qemu/linux-x86_64/qemu-system-*
          sudo rm -rf /usr/local/lib/android/sdk/system-images/android-30
          sudo rm -rf /usr/local/lib/android/sdk/system-images/android-29
          sudo rm -rf /usr/local/lib/android/sdk/system-images/android-31
          sudo rm -rf /usr/local/lib/android/sdk/system-images/android-32
          sudo rm -rf /usr/local/lib/android/sdk/system-images/android-33
          sudo rm -rf /usr/local/lib/android/sdk/system-images/android-34
          sudo rm -rf /usr/local/lib/android/sdk/system-images/android-35
          df -h

      - name: Create AVD and run Detox tests
        uses: reactivecircus/android-emulator-runner@v2
        id: detox_android_tests
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_3a
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -memory 512 -cores 2
          disable-animations: true
          emulator-boot-timeout: 1200
          script: |
            cd example
            echo "🚀 Starting Metro bundler..."
            npx react-native start &
            METRO_PID=$!
            
            echo "⏳ Waiting for Metro to start..."
            sleep 45
            
            echo "🧪 Running Detox E2E tests..."
            npx detox test --configuration android || echo "⚠️  Detox tests completed with issues, but continuing..."
            
            echo "🛑 Stopping Metro bundler..."
            kill $METRO_PID || true
            sleep 5

      - name: Check for Android snapshot differences
        if: always()
        working-directory: example
        run: |
          if [ -d "e2e/snapshots/output" ] && [ "$(ls -A e2e/snapshots/output 2>/dev/null)" ]; then
            echo "## 🤖 Android Visual Regression Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Some Android visual snapshots have changed. This could be due to:" >> $GITHUB_STEP_SUMMARY
            echo "- UI changes in the React Native example" >> $GITHUB_STEP_SUMMARY
            echo "- Different rendering between Android versions" >> $GITHUB_STEP_SUMMARY
            echo "- Font or styling differences" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**To update snapshots:**" >> $GITHUB_STEP_SUMMARY
            echo "1. Download the \`detox-snapshots-android\` artifact" >> $GITHUB_STEP_SUMMARY
            echo "2. Replace \`example/e2e/snapshots/reference/\` with the downloaded files" >> $GITHUB_STEP_SUMMARY
            echo "3. Commit the updated snapshots" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Diff files available in artifacts:**" >> $GITHUB_STEP_SUMMARY
            find e2e/snapshots/output -name "*.png" | head -5 | while read file; do
              echo "- \`$(basename "$file")\`" >> $GITHUB_STEP_SUMMARY
            done
          fi

      - name: Upload Detox Snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detox-snapshots-android
          path: |
            example/e2e/snapshots/output/**/*.png
            example/e2e/snapshots/reference/**/*.png
            example/artifacts/**/*.png

      - name: Upload Detox Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detox-test-results-android
          path: |
            example/e2e/test-results/**/*
            example/artifacts/**/*.xml

      - name: Fail CI if Android tests failed
        if: steps.detox_android_tests.outcome == 'failure'
        run: |
          echo "❌ Android Detox tests failed - failing CI"
          exit 1

  build-web-example:
    name: Build Web Example
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Build library
        run: npm run build

      - name: Install web example dependencies
        working-directory: example-web
        run: npm ci

      - name: Build web example (production)
        working-directory: example-web
        run: npm run build

      - name: Verify build output
        working-directory: example-web
        run: |
          echo "✅ Web build completed successfully"
          ls -lh dist/
          du -sh dist/
          echo ""
          echo "Build contains:"
          ls -1 dist/

      - name: Upload web build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: example-web/dist/
          retention-days: 7

      - name: Build summary
        working-directory: example-web
        run: |
          echo "### Web Build Summary 🌐" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Production build successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Bundle size:** $(du -sh dist/ | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Files:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh dist/ >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  test-web-example:
    name: Test Web Example (Playwright)
    runs-on: ubuntu-latest
    needs: build-web-example

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Build library
        run: npm run build

      - name: Install web example dependencies
        working-directory: example-web
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: example-web
        run: npx playwright install chromium --with-deps

      - name: Start web development server
        working-directory: example-web
        run: |
          npx webpack serve --mode development --port 3000 &
          echo $! > web-server.pid
          sleep 30
          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "✅ Web server is ready"
              break
            fi
            echo "⏳ Waiting for web server... ($i/30)"
            sleep 2
          done
          
      - name: Run Playwright tests
        working-directory: example-web
        run: |
          # Generate reference snapshots (this will create them if they don't exist)
          npm run test:e2e:update-snapshots
        id: playwright_tests
        
      - name: Stop web development server
        if: always()
        working-directory: example-web
        run: |
          if [ -f web-server.pid ]; then
            kill $(cat web-server.pid) || true
            rm web-server.pid
          fi

      - name: Check for snapshot differences
        if: failure() && steps.playwright_tests.outcome == 'failure'
        working-directory: example-web
        run: |
          if [ -d "test-results" ]; then
            echo "## 📸 Visual Regression Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Some visual snapshots have changed. This could be due to:" >> $GITHUB_STEP_SUMMARY
            echo "- UI changes in the web example" >> $GITHUB_STEP_SUMMARY
            echo "- Different rendering between platforms (Linux CI vs local macOS)" >> $GITHUB_STEP_SUMMARY
            echo "- Font or styling differences" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**To update snapshots:**" >> $GITHUB_STEP_SUMMARY
            echo "1. Download the \`web-snapshots-reference\` artifact" >> $GITHUB_STEP_SUMMARY
            echo "2. Replace \`example-web/e2e/snapshots/reference/\` with the downloaded files" >> $GITHUB_STEP_SUMMARY
            echo "3. Commit the updated snapshots" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Diff files available in artifacts:**" >> $GITHUB_STEP_SUMMARY
            find test-results -name "*-diff.png" | head -5 | while read file; do
              echo "- \`$(basename "$file")\`" >> $GITHUB_STEP_SUMMARY
            done
          fi

      - name: Upload generated snapshots (for updates)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-snapshots-generated
          path: example-web/e2e/snapshots/output/
          retention-days: 30

      - name: Upload snapshot diffs (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-snapshots-diff
          path: |
            example-web/test-results/**/*-diff.png
            example-web/test-results/**/*-actual.png
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: example-web/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: example-web/test-results/
          retention-days: 7

      - name: Fail if tests failed
        if: steps.playwright_tests.outcome == 'failure'
        run: exit 1

